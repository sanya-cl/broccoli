<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Кликер</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: #f5f5f5;
        }
        .block {
            background: white;
            padding: 40px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .number {
            font-size: 72px;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
        }
        button {
            font-size: 24px;
            padding: 15px 50px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="block">
        <h1>🖱️ Кликер</h1>

        <!-- Сюда Flask вставит число -->
        <div class="number">{{ score }}</div>

        <!-- Форма с кнопкой -->
        <form method="post">
            <button type="submit">Нажми меня!</button>
        </form>
    </div>
</body>
</html>
