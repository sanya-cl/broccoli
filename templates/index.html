<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стильный гид - подбор образа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: deepskyblue;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .main-card {
            background: white;
            border-radius: 2px;
            padding: 30px;
        }

        h1 {
            font-size: 2.2rem;
            color: black;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: black;
            margin-bottom: 30px;
            font-size: 1.0rem;
        }

        .weather-categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .weather-tag {
            padding: 6px 15px;
            border-radius: 2px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #f0f0f0;
            color: #555;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: black;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: lightseagreen;
            color: white;
            border: none;
            border-radius: 2px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: black;
            margin-top: 10px;
        }

        .btn-submit:hover {
            filter: brightness(0.8)
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .alert {
            padding: 14px 18px;
            border-radius: 3px;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .quick-examples {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .example-btn {
            padding: 6px 15px;
            border-radius: 2px;
            border: 2px dashed #ddd;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .example-btn:hover {
            border-color: #667eea;
            color: #667eea;
            background: #667eea;
        }

        @media (max-width: 480px) {
            .main-card {
                padding: 25px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .weather-categories {
                gap: 8px;
            }

            .weather-tag {
                font-size: 0.75rem;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <h1>👔 Стильный гид</h1>
            <p class="subtitle">Подберем образ для любой погоды.
                                 Основные виды погодных условий:</p>

            <!-- Погодные категории -->
            <div class="weather-categories">
                <span class="weather-tag">❄️ Снег</span>
                <span class="weather-tag">🌧 Дождь</span>
                <span class="weather-tag">⛅ Прохладно</span>
                <span class="weather-tag">☀️ Тепло</span>
            </div>

            <!-- Flash-сообщения -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="city">>Город<</label>
                    <input type="text" id="city" name="city"
                           placeholder="Например: Москва, Лондон, Париж"
                           value="{{ request.form.city if request.form else '' }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="event">+ Что планируете делать?</label>
                    <select id="event" name="event" required>
                        <option value="">-- Выберите мероприятие --</option>
                        <option value="Прогулка">🚶🚶‍♂️🚶‍♂️Прогулка</option>
                        <option value="Мероприятие">🎟Мероприятие🎟</option>
                        <option value="Работа">💼Работа📝</option>
                        <option value="Спорт">🏌️‍♂️Спорт🤸‍♂️</option>
                        <option value="Пляж">🏖 Пляж</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">
                    ! Подобрать образ !
                </button>
            </form>

        </div>
    </div>
</body>
</html>
